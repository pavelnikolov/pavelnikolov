<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="canonical" href="{{ .Permalink }}">
    <script>
      (() => {
        const storageKey = "theme-preference";
        const getSystemTheme = () => window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        const storedPreference = localStorage.getItem(storageKey);
        const theme = storedPreference === "light" || storedPreference === "dark" ? storedPreference : getSystemTheme();
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,500;7..72,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    {{ $css := resources.Get "css/site.css" | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">
  </head>
  <body>
    <div class="bg-glow"></div>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
        <nav class="site-nav" aria-label="Main navigation">
          {{ range .Site.Menus.main }}
          <a href="{{ .URL }}">{{ .Name }}</a>
          {{ end }}
          <button id="theme-toggle" class="theme-toggle" type="button">
            <span class="sr-only">Toggle color theme</span>
            <svg aria-hidden="true" viewBox="0 0 24 24" class="theme-icon">
              <path id="theme-icon-path"></path>
            </svg>
          </button>
        </nav>
      </div>
    </header>

    <main class="container">
      {{ block "main" . }}{{ end }}
    </main>

    <footer class="site-footer container">
      <small>&copy; {{ now.Year }} Pavel Nikolov</small>
    </footer>
    <script>
      (() => {
        const storageKey = "theme-preference";
        const systemMedia = window.matchMedia("(prefers-color-scheme: dark)");
        const themeToggle = document.getElementById("theme-toggle");
        const themeIconPath = document.getElementById("theme-icon-path");
        const sunIcon = "M12 3a1 1 0 0 1 1 1v1.2a1 1 0 1 1-2 0V4a1 1 0 0 1 1-1Zm0 14a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0 4a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1ZM4 11a1 1 0 1 0 0 2h1a1 1 0 1 0 0-2H4Zm15 0a1 1 0 1 0 0 2h1a1 1 0 1 0 0-2h-1ZM6.34 5.64a1 1 0 0 1 1.42 0l.84.85A1 1 0 0 1 7.18 7.9l-.84-.84a1 1 0 0 1 0-1.42Zm9.9 9.9a1 1 0 0 1 1.42 0l.84.84a1 1 0 1 1-1.42 1.42l-.84-.84a1 1 0 0 1 0-1.42Zm2.26-9.9a1 1 0 0 1 0 1.42l-.84.84a1 1 0 1 1-1.42-1.42l.84-.84a1 1 0 0 1 1.42 0Zm-9.9 9.9a1 1 0 0 1 0 1.42l-.84.84a1 1 0 1 1-1.42-1.42l.84-.84a1 1 0 0 1 1.42 0Z";
        const moonIcon = "M21 14.35A9 9 0 1 1 9.65 3a1 1 0 0 1 .92 1.63A7 7 0 1 0 19.37 13.43 1 1 0 0 1 21 14.35Z";
        const getStoredPreference = () => {
          const storedPreference = localStorage.getItem(storageKey);
          return storedPreference === "light" || storedPreference === "dark" ? storedPreference : null;
        };
        const getSystemTheme = () => systemMedia.matches ? "dark" : "light";
        const updateToggleIcon = (theme) => {
          if (!themeIconPath || !themeToggle) return;
          themeIconPath.setAttribute("d", theme === "dark" ? moonIcon : sunIcon);
          themeToggle.setAttribute("aria-label", `Switch to ${theme === "dark" ? "light" : "dark"} theme`);
        };
        const applyTheme = (theme) => {
          document.documentElement.dataset.theme = theme;
          updateToggleIcon(theme);
        };
        const syncSystemTheme = () => {
          if (!getStoredPreference()) {
            applyTheme(getSystemTheme());
          }
        };
        const getCurrentTheme = () => getStoredPreference() || getSystemTheme();

        if (!themeToggle) return;

        applyTheme(getCurrentTheme());

        themeToggle.addEventListener("click", () => {
          const nextTheme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
          localStorage.setItem(storageKey, nextTheme);
          applyTheme(nextTheme);
        });

        if (systemMedia.addEventListener) {
          systemMedia.addEventListener("change", syncSystemTheme);
        } else {
          systemMedia.addListener(syncSystemTheme);
        }
      })();
    </script>
  </body>
</html>
